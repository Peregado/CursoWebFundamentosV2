<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    
    <title>Login</title>
</head>
<body>
    <h1>Login</h1>

    <form action="#" method="post">
        <fieldset>
            <legend>Login</legend>

            <label for="user">Usuário</label>
            <input type="text" id="user" required autofocus>

            <label for="pass">Senha</label>
            <input type="password" id="pass" required>

            <input type="submit" value="Entrar">
        </fieldset>
    </form>
    
</body>
</html>
