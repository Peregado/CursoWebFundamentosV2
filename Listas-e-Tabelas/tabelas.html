<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    
    <title>Tables</title>

    <style>
        body {
            font-family: sans-serif;
        }

        table {
            width: 80%;
            margin: auto;
            background-color: beige;
            border-collapse: collapse;
        }

        td {
            border: 1px solid black;
            text-align: center;
        }

        th {
            background-color: rgb(238, 238, 131);
            border: 2px solid;
            padding: 16px;
        }

    </style>
</head>
<body>
    <table>
        <caption>Tabela de preços de cursos</caption>

        <thead>
            <tr>
            <tr>
                <th>Área</th>
                <th>Curso</th>
                <th>Invenstimento</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td rowspan="3">Design</td>
                <td>InDesign</td>
                <td>R$ 1.000,00</td>
            </tr>

            <tr>
                
                <td>Photoshop</td>
                <td>R$ 1.000,00</td>
            </tr>

            <tr>
                
                <td>Ilustrator</td>
                <td>R$ 1.000,00</td>
            </tr>

            <tr>
                <td rowspan="4">Development</td>
                <td>HTML</td>
                <td>R$ 1.000,00</td>
            </tr>

            <tr>
                <td>CSS</td>
                <td>R$ 1.000,00</td>
            </tr>

             <tr>
                <td>Javascript</td>
                <td>R$ 1.000,00</td>
            </tr>

             <tr>
                <td>PHP</td>
                <td>R$ 1.000,00</td>
            </tr>

        </tbody>

        <tfoot>
            <tr>
                <td colspan="3">Valores sujeitos a alterações sem prévio aviso</td>
            </tr>
        </tfoot>
    </table>
   
</body>
</html>
